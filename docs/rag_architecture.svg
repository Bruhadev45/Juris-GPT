<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="queryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="preprocGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="retrievalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="rerankGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd9"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ede7f6"/>
      <stop offset="100%" style="stop-color:#d1c4e9"/>
    </linearGradient>
    <linearGradient id="responseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f8fafc"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="70" fill="url(#headerGrad)"/>
  <text x="600" y="35" text-anchor="middle" fill="white" font-size="24" font-weight="bold">JurisGPT RAG Architecture</text>
  <text x="600" y="55" text-anchor="middle" fill="#90caf9" font-size="12">Citation-Grounded Legal Research Assistant for Indian Law</text>

  <!-- User Query Box -->
  <g filter="url(#shadow)">
    <rect x="450" y="90" width="300" height="50" rx="8" fill="url(#queryGrad)" stroke="#1976d2" stroke-width="2"/>
    <text x="600" y="115" text-anchor="middle" fill="#0d47a1" font-size="13" font-weight="600">User Query</text>
    <text x="600" y="130" text-anchor="middle" fill="#1565c0" font-size="10">"What are LLP registration requirements?"</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M600 140 L600 160" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/></marker></defs>

  <!-- Query Preprocessing -->
  <g filter="url(#shadow)">
    <rect x="350" y="165" width="500" height="80" rx="10" fill="url(#preprocGrad)" stroke="#f57c00" stroke-width="2"/>
    <text x="600" y="185" text-anchor="middle" fill="#e65100" font-size="14" font-weight="bold">Query Preprocessing</text>
    <text x="420" y="210" fill="#bf360c" font-size="11">• Legal Abbreviation Expansion</text>
    <text x="420" y="225" fill="#bf360c" font-size="11">• Section Reference Normalization</text>
    <text x="650" y="210" fill="#bf360c" font-size="11">• Tokenization</text>
    <text x="650" y="225" fill="#bf360c" font-size="11">• Stopword Removal</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M600 245 L600 265" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Hybrid Retrieval -->
  <g filter="url(#shadow)">
    <rect x="100" y="270" width="1000" height="140" rx="10" fill="url(#retrievalGrad)" stroke="#388e3c" stroke-width="2"/>
    <text x="600" y="295" text-anchor="middle" fill="#1b5e20" font-size="14" font-weight="bold">Hybrid Retrieval System</text>

    <!-- BM25 Box -->
    <rect x="150" y="310" width="200" height="80" rx="6" fill="white" stroke="#4caf50" stroke-width="1.5"/>
    <text x="250" y="335" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="600">BM25 Lexical</text>
    <text x="250" y="355" text-anchor="middle" fill="#388e3c" font-size="10">Term Frequency + IDF</text>
    <text x="250" y="370" text-anchor="middle" fill="#388e3c" font-size="10">Weight: 0.4</text>

    <!-- Semantic Box -->
    <rect x="850" y="310" width="200" height="80" rx="6" fill="white" stroke="#4caf50" stroke-width="1.5"/>
    <text x="950" y="335" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="600">Semantic Search</text>
    <text x="950" y="355" text-anchor="middle" fill="#388e3c" font-size="10">InLegalBERT (768d)</text>
    <text x="950" y="370" text-anchor="middle" fill="#388e3c" font-size="10">Weight: 0.6</text>

    <!-- RRF Box -->
    <rect x="475" y="320" width="250" height="60" rx="6" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="600" y="345" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="600">Reciprocal Rank Fusion (RRF)</text>
    <text x="600" y="365" text-anchor="middle" fill="#2e7d32" font-size="10">Score = Σ 1/(k + rank)</text>

    <!-- Arrows to RRF -->
    <path d="M350 350 L475 350" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowhead2)"/>
    <path d="M850 350 L725 350" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowhead2)"/>
    <defs><marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e7d32"/></marker></defs>
  </g>

  <!-- Arrow 3 -->
  <path d="M600 410 L600 430" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Re-ranking -->
  <g filter="url(#shadow)">
    <rect x="350" y="435" width="500" height="70" rx="10" fill="url(#rerankGrad)" stroke="#c2185b" stroke-width="2"/>
    <text x="600" y="460" text-anchor="middle" fill="#880e4f" font-size="14" font-weight="bold">Cross-Encoder Re-ranking</text>
    <text x="450" y="485" fill="#ad1457" font-size="11">• ms-marco-MiniLM-L-6-v2</text>
    <text x="700" y="485" fill="#ad1457" font-size="11">• Top-K Selection (k=5)</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M600 505 L600 525" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Confidence Assessment -->
  <g filter="url(#shadow)">
    <rect x="350" y="530" width="500" height="70" rx="10" fill="#fff8e1" stroke="#ffa000" stroke-width="2"/>
    <text x="600" y="555" text-anchor="middle" fill="#ff6f00" font-size="14" font-weight="bold">Confidence Assessment</text>
    <text x="400" y="580" fill="#e65100" font-size="10">• Citation Count</text>
    <text x="550" y="580" fill="#e65100" font-size="10">• Topic Match</text>
    <text x="700" y="580" fill="#e65100" font-size="10">• Source Diversity</text>
  </g>

  <!-- Arrow 5 -->
  <path d="M600 600 L600 620" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- LLM Generation -->
  <g filter="url(#shadow)">
    <rect x="300" y="625" width="600" height="90" rx="10" fill="url(#llmGrad)" stroke="#7b1fa2" stroke-width="2"/>
    <text x="600" y="650" text-anchor="middle" fill="#4a148c" font-size="14" font-weight="bold">LLM Generation (Claude Sonnet 4 via PageGrid)</text>
    <text x="400" y="675" fill="#6a1b9a" font-size="11">• Citation-grounded responses</text>
    <text x="400" y="695" fill="#6a1b9a" font-size="11">• Inline citations [1], [2], [3]</text>
    <text x="650" y="675" fill="#6a1b9a" font-size="11">• No hallucination</text>
    <text x="650" y="695" fill="#6a1b9a" font-size="11">• Structured markdown</text>
  </g>

  <!-- Arrow 6 -->
  <path d="M600 715 L600 735" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Response Box -->
  <g filter="url(#shadow)">
    <rect x="300" y="740" width="600" height="80" rx="10" fill="url(#responseGrad)" stroke="#00838f" stroke-width="2"/>
    <text x="600" y="765" text-anchor="middle" fill="#006064" font-size="14" font-weight="bold">Structured Response</text>
    <text x="380" y="790" fill="#00695c" font-size="10">answer + citations</text>
    <text x="520" y="790" fill="#00695c" font-size="10">confidence: high</text>
    <text x="660" y="790" fill="#00695c" font-size="10">grounded: true</text>
    <text x="800" y="790" fill="#00695c" font-size="10">follow_ups</text>
  </g>

  <!-- Legal Corpus (Side Panel) -->
  <g filter="url(#shadow)">
    <rect x="30" y="270" width="60" height="140" rx="6" fill="#fff8e1" stroke="#ff8f00" stroke-width="1.5"/>
    <text x="60" y="295" text-anchor="middle" fill="#e65100" font-size="10" font-weight="600">Corpus</text>
    <text x="60" y="320" text-anchor="middle" fill="#f57c00" font-size="8">47,756</text>
    <text x="60" y="335" text-anchor="middle" fill="#f57c00" font-size="8">docs</text>
    <text x="60" y="360" text-anchor="middle" fill="#ef6c00" font-size="7">Statutes</text>
    <text x="60" y="375" text-anchor="middle" fill="#ef6c00" font-size="7">Cases</text>
    <text x="60" y="390" text-anchor="middle" fill="#ef6c00" font-size="7">Clauses</text>
  </g>
  <path d="M90 340 L100 340" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Tech Stack Labels -->
  <text x="1100" y="300" text-anchor="end" fill="#78909c" font-size="9">BM25Okapi</text>
  <text x="1100" y="315" text-anchor="end" fill="#78909c" font-size="9">InLegalBERT</text>
  <text x="1100" y="470" text-anchor="end" fill="#78909c" font-size="9">ms-marco-MiniLM</text>
  <text x="1100" y="670" text-anchor="end" fill="#78909c" font-size="9">claude-sonnet-4-6</text>
  <text x="1100" y="685" text-anchor="end" fill="#78909c" font-size="9">PageGrid API</text>

  <!-- Footer -->
  <rect x="0" y="840" width="1200" height="60" fill="#eceff1"/>
  <text x="600" y="865" text-anchor="middle" fill="#546e7a" font-size="11">JurisGPT v2.0 | Research-Level Citation-Grounded Legal AI for Indian Law</text>
  <text x="600" y="885" text-anchor="middle" fill="#78909c" font-size="9">Hybrid Retrieval (BM25 + Semantic) | Cross-Encoder Re-ranking | Claude LLM via PageGrid</text>
</svg>
