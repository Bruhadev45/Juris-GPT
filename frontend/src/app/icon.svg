<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="burgundy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B2636"/>
      <stop offset="100%" style="stop-color:#7B1E2E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A55A"/>
      <stop offset="100%" style="stop-color:#B8884D"/>
    </linearGradient>
  </defs>

  <!-- Burgundy background -->
  <rect width="32" height="32" rx="7" fill="url(#burgundy)"/>

  <!-- Scales of Justice in Gold -->
  <!-- Center pillar -->
  <rect x="15" y="9" width="2" height="13" fill="url(#gold)"/>

  <!-- Top beam -->
  <rect x="7" y="8" width="18" height="2" rx="1" fill="url(#gold)"/>

  <!-- Left chain -->
  <line x1="9" y1="10" x2="9" y2="14" stroke="url(#gold)" stroke-width="1"/>
  <!-- Left pan -->
  <path d="M5 14.5 L6 18.5 Q6 20 9 20 Q12 20 12 18.5 L13 14.5 Z" fill="url(#gold)"/>

  <!-- Right chain -->
  <line x1="23" y1="10" x2="23" y2="14" stroke="url(#gold)" stroke-width="1"/>
  <!-- Right pan -->
  <path d="M19 14.5 L20 18.5 Q20 20 23 20 Q26 20 26 18.5 L27 14.5 Z" fill="url(#gold)"/>

  <!-- Base pedestal -->
  <rect x="12" y="22" width="8" height="2" rx="0.5" fill="url(#gold)"/>
  <path d="M14 22 L14 24 L18 24 L18 22 L16 20 Z" fill="url(#gold)"/>

  <!-- Cream accent dot -->
  <circle cx="16" cy="5" r="1.5" fill="#FAF6EF"/>
</svg>
