services:
  - type: web
    name: jurisgpt-backend
    runtime: python
    region: singapore        # closest of {oregon, frankfurt, ohio, singapore} to India
    plan: free               # upgrade to "starter" ($7/mo) for always-on; "free" sleeps after 15 min idle
    rootDir: backend
    pythonVersion: "3.11"

    buildCommand: pip install -r requirements.txt
    # Render injects $PORT — must bind there, not a fixed port.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /api/info

    envVars:
      - key: ENVIRONMENT
        value: production

      # === RAG embedding model ===
      # Render free has 512 MB RAM — InLegalBERT (~700 MB) will OOM-kill the
      # worker on first chat. Use MiniLM (~80 MB) on free tier; switch back to
      # `law-ai/InLegalBERT` once you're on Standard ($25/mo, 2 GB RAM).
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2

      # === Auth — ALL required ===
      - key: JWT_SECRET
        sync: false          # set in dashboard; required at startup in production

      # === LLM provider keys — set whichever you use ===
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        sync: false          # optional — used for PageGrid proxy etc.

      # === Supabase — required ===
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

      # === DigitalOcean Spaces (file uploads) ===
      - key: DO_SPACES_KEY
        sync: false
      - key: DO_SPACES_SECRET
        sync: false
      - key: DO_SPACES_REGION
        value: sgp1
      - key: DO_SPACES_BUCKET
        value: jurisgpt-data
      - key: DO_SPACES_ENDPOINT
        sync: false          # e.g. https://sgp1.digitaloceanspaces.com

      # === Email (optional) ===
      - key: RESEND_API_KEY
        sync: false

      # === External legal APIs (optional) ===
      - key: INDIAN_KANOON_API_KEY
        sync: false
